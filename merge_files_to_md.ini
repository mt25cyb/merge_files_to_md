; ==============================================
; 文件内容合并工具配置文件 v2.0
; 与 merge_files_to_md.py 同名配套使用
; ==============================================

[OutputFolder]
; 输出文件所在的目录
; 支持相对路径（相对于脚本所在目录）和绝对路径
; 目录不存在时脚本会自动创建
_backups

[OutputFileName]
; 输出 Markdown 文件的名称前缀
; 最终文件名格式：前缀-年月日时分.md
; 同一分钟内重复运行会自动追加秒数避免覆盖
完整文件代码

[Title]
; 合并后文档的一级标题（置顶）
; 取第一行非空内容作为标题文本
Merge Files to Markdown 项目源代码合并备份

[Options]
; 全局功能开关
; EnableBackupZip：是否生成源文件备份压缩包（true/false）
; 压缩包与 Markdown 同名，保存在同一输出目录下
; 不填写此项时默认开启
EnableBackupZip = true

[IgnoreList]
; 文件忽略规则，优先级最高，匹配后无论手动列出还是通配符展开都会被过滤
; 支持精确路径匹配和 glob 通配符匹配，路径层级严格对应
; *.log          仅匹配根目录下的 .log 文件
; utils\*.log    仅匹配 utils 目录下的 .log 文件
; *\*.log        匹配所有一级子目录下的 .log 文件
*.log
temp\*.tmp
*\*.bak

[FileList]
; 待合并的文件清单，严格按从上到下的顺序输出
; 支持相对路径、绝对路径、目录通配符（目录\* 表示该目录下所有直接文件）
; 通配符仅匹配直接文件，不递归子目录，匹配结果按文件名升序排列
init-install-powershell-7.ps1
scripts\*
config\.env

[LangMap]
; 特殊文件名自定义语言标识
; 格式：完整文件名 = 代码块语言标识
; 优先级高于后缀自动匹配，专门用于无后缀、自定义命名的特殊文件
.env = ini
.env.example = ini
Dockerfile = dockerfile
LICENSE = text
